openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: KDP Puzzle Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: books
    description: Book project management
  - name: generate
    description: PDF and puzzle generation
  - name: niche
    description: Niche intelligence
  - name: anthropic
    description: Anthropic AI chat operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List all saved book projects
      responses:
        "200":
          description: List of book projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"

    post:
      operationId: createBook
      tags: [books]
      summary: Save a new book project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "201":
          description: Created book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get a book project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateBook
      tags: [books]
      summary: Update a book project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "200":
          description: Updated book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteBook
      tags: [books]
      summary: Delete a book project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /books/{id}/clone:
    post:
      operationId: cloneBook
      tags: [books]
      summary: Clone a book project as a new volume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Cloned book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /generate:
    post:
      operationId: generateBook
      tags: [generate]
      summary: Generate interior and cover HTML for a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookConfig"
      responses:
        "200":
          description: Generated HTML and metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResult"

  /pdf/interior:
    post:
      operationId: renderInteriorPdf
      tags: [generate]
      summary: Render interior HTML to PDF via Puppeteer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookConfig"
      responses:
        "200":
          description: PDF binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /pdf/cover:
    post:
      operationId: renderCoverPdf
      tags: [generate]
      summary: Render full-wrap cover HTML to PDF via Puppeteer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookConfig"
      responses:
        "200":
          description: PDF binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /cover-preview:
    post:
      operationId: coverPreview
      tags: [generate]
      summary: Generate cover HTML for live browser preview (no puzzle generation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoverPreviewRequest"
      responses:
        "200":
          description: Cover HTML and dimensions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverPreviewResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /puzzles/preview:
    post:
      operationId: previewPuzzles
      tags: [generate]
      summary: Generate 2-3 sample puzzles as JSON for live browser preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewRequest"
      responses:
        "200":
          description: Sample puzzle data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewResult"

  /niche-assistant:
    post:
      operationId: getNicheData
      tags: [niche]
      summary: Get themed words, title ideas, and KDP keywords for a niche
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NicheRequest"
      responses:
        "200":
          description: Niche intelligence data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NicheResult"

  /niches:
    get:
      operationId: listNiches
      tags: [niche]
      summary: List all available niches
      responses:
        "200":
          description: List of niche keys and labels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NicheInfo"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /ai/book-ideas:
    post:
      operationId: getBookIdeas
      tags: [anthropic]
      summary: Get AI-generated opportunity cards for KDP puzzle books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookIdeasRequest"
      responses:
        "200":
          description: Opportunity cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookIdeasResult"

  /ai/score-title:
    post:
      operationId: scoreTitle
      tags: [anthropic]
      summary: Score a book title and get rewrite suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreTitleRequest"
      responses:
        "200":
          description: Score and suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreTitleResult"

  /ai/niche-ideas:
    post:
      operationId: getNicheIdeas
      tags: [anthropic]
      summary: Get top niche ideas for a given puzzle type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NicheIdeasRequest"
      responses:
        "200":
          description: Top niche ideas with sell rationale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NicheIdeasResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    BookConfig:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
        author:
          type: string
        puzzleType:
          type: string
          enum: [Word Search, Sudoku, Maze, Number Search, Cryptogram]
        puzzleCount:
          type: integer
        difficulty:
          type: string
          enum: [Easy, Medium, Hard]
        largePrint:
          type: boolean
        paperType:
          type: string
          enum: [white, cream]
        theme:
          type: string
          enum: [midnight, forest, crimson, ocean, violet, slate, sunrise, teal, parchment, sky]
        coverStyle:
          type: string
          enum: [classic, geometric, luxury, bold, minimal, retro, warmth]
        backDescription:
          type: string
        words:
          type: array
          items:
            type: string
        wordCategory:
          type: string
        coverImageUrl:
          type: string
        series:
          type: string
        volumeNumber:
          type: integer
      required:
        - title
        - puzzleType

    CreateBookBody:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
        author:
          type: string
        puzzleType:
          type: string
        puzzleCount:
          type: integer
        difficulty:
          type: string
        largePrint:
          type: boolean
        paperType:
          type: string
        theme:
          type: string
        coverStyle:
          type: string
        backDescription:
          type: string
        words:
          type: array
          items:
            type: string
        wordCategory:
          type: string
        coverImageUrl:
          type: string
        niche:
          type: string
        volumeNumber:
          type: integer
      required:
        - title
        - puzzleType

    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: string
        author:
          type: string
        puzzleType:
          type: string
        puzzleCount:
          type: integer
        difficulty:
          type: string
        largePrint:
          type: boolean
        paperType:
          type: string
        theme:
          type: string
        coverStyle:
          type: string
        backDescription:
          type: string
        words:
          type: array
          items:
            type: string
        wordCategory:
          type: string
        coverImageUrl:
          type: string
        niche:
          type: string
        volumeNumber:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - puzzleType
        - createdAt
        - updatedAt

    GenerateResult:
      type: object
      properties:
        interiorHtml:
          type: string
        totalPages:
          type: integer
        coverHtml:
          type: string
        coverDims:
          $ref: "#/components/schemas/CoverDims"
      required:
        - interiorHtml
        - totalPages
        - coverHtml
        - coverDims

    CoverDims:
      type: object
      properties:
        fullW:
          type: number
        fullH:
          type: number
        spineW:
          type: number
      required:
        - fullW
        - fullH
        - spineW

    PreviewRequest:
      type: object
      properties:
        puzzleType:
          type: string
        difficulty:
          type: string
        largePrint:
          type: boolean
        words:
          type: array
          items:
            type: string
        count:
          type: integer
      required:
        - puzzleType

    CoverPreviewRequest:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
        author:
          type: string
        theme:
          type: string
        coverStyle:
          type: string
        volumeNumber:
          type: integer
        series:
          type: string
        backDescription:
          type: string
        largePrint:
          type: boolean
        puzzleCount:
          type: integer
        puzzleType:
          type: string
        difficulty:
          type: string
        paperType:
          type: string
        coverImageUrl:
          type: string
      required:
        - title

    CoverDims:
      type: object
      properties:
        fullW:
          type: number
        fullH:
          type: number
        spineW:
          type: number
      required:
        - fullW
        - fullH
        - spineW

    CoverPreviewResult:
      type: object
      properties:
        html:
          type: string
        coverDims:
          $ref: "#/components/schemas/CoverDims"
      required:
        - html
        - coverDims

    PreviewResult:
      type: object
      properties:
        puzzles:
          type: array
          items:
            $ref: "#/components/schemas/PuzzleData"
        puzzleType:
          type: string
      required:
        - puzzles
        - puzzleType

    PuzzleData:
      type: object
      properties:
        type:
          type: string
        wordSearch:
          $ref: "#/components/schemas/WordSearchData"
        sudoku:
          $ref: "#/components/schemas/SudokuData"
        maze:
          $ref: "#/components/schemas/MazeData"
        numberSearch:
          $ref: "#/components/schemas/NumberSearchData"
        cryptogram:
          $ref: "#/components/schemas/CryptogramData"

    WordSearchData:
      type: object
      properties:
        grid:
          type: array
          items:
            type: array
            items:
              type: string
        placed:
          type: array
          items:
            type: string
        pSet:
          type: object
          additionalProperties:
            type: boolean
      required:
        - grid
        - placed
        - pSet

    SudokuData:
      type: object
      properties:
        puzzle:
          type: array
          items:
            type: array
            items:
              type: integer
        solution:
          type: array
          items:
            type: array
            items:
              type: integer
      required:
        - puzzle
        - solution

    MazeData:
      type: object
      properties:
        grid:
          type: array
          items:
            type: array
            items:
              type: integer
        rows:
          type: integer
        cols:
          type: integer
      required:
        - grid
        - rows
        - cols

    NumberSearchData:
      type: object
      properties:
        grid:
          type: array
          items:
            type: array
            items:
              type: string
        placed:
          type: array
          items:
            type: string
        pSet:
          type: object
          additionalProperties:
            type: boolean
      required:
        - grid
        - placed
        - pSet

    CryptogramData:
      type: object
      properties:
        cipher:
          type: string
        plain:
          type: string
        key:
          type: object
          additionalProperties:
            type: string
      required:
        - cipher
        - plain
        - key

    NicheRequest:
      type: object
      properties:
        niche:
          type: string
      required:
        - niche

    NicheResult:
      type: object
      properties:
        niche:
          type: string
        label:
          type: string
        words:
          type: array
          items:
            type: string
        titles:
          type: array
          items:
            type: string
        keywords:
          type: array
          items:
            type: string
        backBlurb:
          type: string
        recommendedDifficulty:
          type: string
        recommendedCount:
          type: integer
      required:
        - niche
        - label
        - words
        - titles
        - keywords
        - backBlurb

    NicheInfo:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        puzzleType:
          type: string
      required:
        - key
        - label
        - puzzleType

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    BookIdeasRequest:
      type: object
      properties:
        puzzleType:
          type: string
      required: []

    OpportunityCard:
      type: object
      properties:
        puzzleType:
          type: string
        niche:
          type: string
        nicheLabel:
          type: string
        salesPotential:
          type: string
          enum: [Hot, Rising, Stable]
        coverStyle:
          type: string
        difficulty:
          type: string
        puzzleCount:
          type: integer
        pricePoint:
          type: number
        largePrint:
          type: boolean
        theme:
          type: string
        whySells:
          type: string
        title:
          type: string
        subtitle:
          type: string
      required:
        - puzzleType
        - niche
        - nicheLabel
        - salesPotential
        - coverStyle
        - difficulty
        - puzzleCount
        - pricePoint
        - largePrint
        - theme
        - whySells
        - title
        - subtitle

    BookIdeasResult:
      type: object
      properties:
        cards:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityCard"
      required:
        - cards

    ScoreTitleRequest:
      type: object
      properties:
        title:
          type: string
        puzzleType:
          type: string
        niche:
          type: string
      required:
        - title

    ScoreTitleResult:
      type: object
      properties:
        score:
          type: integer
        feedback:
          type: string
        suggestions:
          type: array
          items:
            type: string
      required:
        - score
        - feedback
        - suggestions

    NicheIdeasRequest:
      type: object
      properties:
        puzzleType:
          type: string
      required:
        - puzzleType

    NicheIdea:
      type: object
      properties:
        niche:
          type: string
        nicheLabel:
          type: string
        whySells:
          type: string
      required:
        - niche
        - nicheLabel
        - whySells

    NicheIdeasResult:
      type: object
      properties:
        ideas:
          type: array
          items:
            $ref: "#/components/schemas/NicheIdea"
      required:
        - ideas
